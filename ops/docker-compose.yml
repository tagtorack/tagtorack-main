# C:\AI\Business Owners\TagtoRack\ops\docker-compose.yml
# Stack: Postgres + n8n + Cal.com + Mailpit (dev profile).
# Postgres uses host port 5433 (5432 = system, 5434 = pb5_db_play).
# All secrets in ./.env (gitignored).
# (No top-level `version:` — obsolete and ignored in Docker Compose v2+.)

x-pg-healthcheck: &pg_healthcheck
  test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB_N8N}"]
  interval: 5s
  timeout: 5s
  retries: 20

services:
  postgres:
    image: postgres:16-alpine
    container_name: tt_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB_N8N}
    # Dev-only host exposure (host 5433 → container 5432). In production, drop
    # this mapping so Postgres is reachable only on the internal Docker network.
    ports: ["5433:5432"]
    volumes:
      - pg_tagtorack_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck: *pg_healthcheck

  n8n:
    image: n8nio/n8n:1.74.1
    container_name: tt_n8n
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${PG_DB_N8N}
      DB_POSTGRESDB_USER: ${PG_USER}
      DB_POSTGRESDB_PASSWORD: ${PG_PASSWORD}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://${N8N_HOST}/
      N8N_EDITOR_BASE_URL: https://${N8N_HOST}/
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_JWT_SECRET}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      GENERIC_TIMEZONE: America/Chicago
      TZ: America/Chicago
      EXECUTIONS_TIMEOUT: "600"
      NODE_FUNCTION_ALLOW_EXTERNAL: "cheerio,luxon"
      # crypto: R2 SigV4 presign (WF-5 photo fetch) + HMAC verify in Code nodes.
      NODE_FUNCTION_ALLOW_BUILTIN: "crypto"
      TT_AUTOSEND_ENABLED: ${TT_AUTOSEND_ENABLED}
      # Approval digest: batch seller approval emails (see ops/n8n/NOTIFY-DIGEST.md)
      TT_DIGEST_NOTIFY: ${TT_DIGEST_NOTIFY:-false}
      TT_NOTIFY_QUIET_MIN: ${TT_NOTIFY_QUIET_MIN:-30}
      # Phase 2 — opt-in SMS drop-off notifications (WF-M4). Defaults OFF: leave
      # TT_SMS_ENABLED unset/false until A2P 10DLC registration is approved and the
      # SMS path is verified end-to-end. Twilio creds live in ops/.env (gitignored);
      # set MESSAGING_SERVICE_SID *or* FROM_NUMBER (service SID is preferred for 10DLC).
      TT_SMS_ENABLED: ${TT_SMS_ENABLED:-false}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_MESSAGING_SERVICE_SID: ${TWILIO_MESSAGING_SERVICE_SID:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      TT_DAILY_FLASH_CAP: ${TT_DAILY_FLASH_CAP}
      TT_DAILY_PRO_CAP: ${TT_DAILY_PRO_CAP}
      INTAKE_WEBHOOK_SECRET: ${INTAKE_WEBHOOK_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      OPERATOR_ESCALATION_EMAIL: ${OPERATOR_ESCALATION_EMAIL}
      APP_DB_DSN: postgres://${PG_USER}:${PG_PASSWORD}@postgres:5432/${PG_DB_APP}
      CALCOM_BOOKING_URL: ${CALCOM_BOOKING_URL}
      CALCOM_WEBHOOK_SECRET: ${CALCOM_WEBHOOK_SECRET}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      # Phase C — R2 photo fetch (WF-5 vision) + email autosend.
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      FROM_EMAIL: ${FROM_EMAIL}
      # EMAIL_TRANSPORT=mailpit (dev) routes mail to the Mailpit HTTP API; set to
      # "resend" in production. SUBMIT_PUBLIC_BASE builds the decision-link URLs.
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT}
      SUBMIT_PUBLIC_BASE: ${SUBMIT_PUBLIC_BASE}
      # Shared with Pages — mints the seller status-link HMAC token (must match Pages' value).
      PORTAL_SESSION_SECRET: ${PORTAL_SESSION_SECRET}
    ports: ["5678:5678"]
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      # Use 127.0.0.1 (not localhost): n8n binds IPv4 loopback only, and busybox
      # wget resolves "localhost" to ::1 first -> false "unhealthy". (debugged 2026-05-31)
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5678/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.20
    container_name: tt_mailpit
    restart: unless-stopped
    ports: ["8025:8025", "1025:1025"]
    profiles: ["dev"]

volumes:
  pg_tagtorack_data:
  n8n_data:
